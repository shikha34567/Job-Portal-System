<!DOCTYPE html>
<html>
<head>

<title>Login - Job Portal</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>
body.login-bg{
    background-image: url("images/loginbg.jpg"); /* your background */
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    height: 100vh;
}

.login-container{
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box{
    background: rgba(255,255,255,0.9);
    padding: 30px;
    border-radius: 8px;
    width: 100%;
    max-width: 400px;
}
</style>

</head>

<body class="login-bg">

<div class="container login-container">

<div class="login-box">

<h2 class="text-center mb-4">Login</h2>

<form onsubmit="return loginUser(event)">

<input type="text" id="username" class="form-control mb-3" placeholder="Username" required>

<input type="password" id="password" class="form-control mb-3" placeholder="Password" required>

<button class="btn btn-primary w-100">Login</button>

</form>

</div>

</div>

<script>
function loginUser(event){
    event.preventDefault(); // prevent form submit

    var username = document.getElementById("username").value;
    var password = document.getElementById("password").value;

    if(username !== "" && password !== ""){
        // redirect to home page after login
        window.location.href = "home.html";
        return false;
    } else {
        alert("Please enter username and password");
        return false;
    }
}
</script>

</body>
</html>
