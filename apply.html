<!DOCTYPE html>
<html>
<head>

<title>Apply Job</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body class="apply-bg">

<div class="container apply-form">

<h2 class="text-center">Job Application</h2>

<form action="success.html">

<input class="form-control mb-3" placeholder="Applicant Name" required>

<input class="form-control mb-3" type="email" placeholder="Email" required>

<input class="form-control mb-3" placeholder="Contact Number" required>

<label class="text-white">Upload Resume</label>

<input type="file" class="form-control mb-3" required>

<button class="btn btn-success w-100">Submit Application</button>

</form>

</div>

</body>
</html>
