<!DOCTYPE html>
<html>
<head>

<title>Jobs</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body class="jobs-bg">

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand">JobPortal</a>

<a href="index.html" class="btn btn-light">Home</a>

</div>

</nav>

<div class="container mt-4">

<h2 class="text-center text-white">Available Jobs</h2>

<input type="text" id="search" onkeyup="searchJob()" class="form-control mb-4" placeholder="Search jobs...">

<div class="row" id="jobContainer"></div>

</div>

<script>

let jobs=[

"Software Developer",
"Frontend Developer",
"Backend Developer",
"UI Designer",
"UX Designer",
"Data Analyst",
"AI Engineer",
"Machine Learning Engineer",
"Cloud Engineer",
"Cyber Security Analyst",
"DevOps Engineer",
"Mobile App Developer",
"Game Developer",
"Full Stack Developer",
"Blockchain Developer",
"Database Administrator",
"Network Engineer",
"QA Tester",
"IT Support Engineer",
"System Administrator"

];

let container=document.getElementById("jobContainer");

for(let i=0;i<jobs.length;i++){

container.innerHTML+=`

<div class="col-md-4 jobCard">

<div class="card job-card">

<img src="images/${jobs[i]}.jpg" class="card-img-top">

<div class="card-body text-center">

<h5>${jobs[i]}</h5>

<a href="apply.html" class="btn btn-primary">Apply</a>

</div>

</div>

</div>

`;

}

</script>

<script src="js/script.js"></script>

</body>
</html>
